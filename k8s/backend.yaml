apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jobtracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ambarkovateona/job-tracker-backend:latest
          ports:
            - containerPort: 4445
          resources:
            requests:
              cpu: 250m
              memory: 400Mi
            limits:
              cpu: "1"
              memory: 768Mi
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 4445
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 4445
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 4445
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: jobtracker
spec:
  selector:
    app: backend
  ports:
    - port: 4445
      targetPort: 4445